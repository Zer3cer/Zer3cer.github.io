<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zer3cer - Red Team Operator</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav id="navbar">
        <div class="nav-logo">Zer3<span>c</span>er</div>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="#about" data-i18n="nav_about">About</a></li>
                <li><a href="#projects" data-i18n="nav_projects">Arsenal</a></li>
                <li><a href="#skills" data-i18n="nav_skills">Skills</a></li>
                <li><a href="#contact" data-i18n="nav_contact">Contact</a></li>
            </ul>
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh">中文</button>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero" id="hero">
            <div class="hero-badge">
                <div class="dot"></div>
                <span data-i18n="hero_badge">Red Team Operator</span>
            </div>
            <h1>
                <span data-i18n="hero_line1">Offensive</span><br />
                <span class="red" data-i18n="hero_line2">Security</span>
                <span class="ghost" data-i18n="hero_line3"> Arsenal</span>
            </h1>
            <p class="hero-desc" data-i18n="hero_desc"></p>
            <div class="hero-actions">
                <a href="#projects" class="btn btn-primary">
                    <i class="fa-solid fa-crosshairs"></i>
                    <span data-i18n="hero_btn1">View Arsenal</span>
                </a>
                <a href="#contact" class="btn btn-ghost">
                    <i class="fa-regular fa-paper-plane"></i>
                    <span data-i18n="hero_btn2">Get in Touch</span>
                </a>
            </div>
            <div class="hero-terminal" id="terminal"></div>
        </section>

        <div class="stats-bar" id="stats"></div>

        <section id="about" class="section">
            <div class="section-header">
                <div class="section-tag" data-i18n="about_tag">About</div>
                <h2 class="section-title" data-i18n="about_title">Who is Zer3cer</h2>
            </div>
            <div class="about-grid">
                <div class="about-visual" id="aboutVisual"></div>
                <div class="about-content" id="aboutContent"></div>
            </div>
        </section>

        <section id="projects" class="section">
            <div class="section-header">
                <div class="section-tag" data-i18n="proj_tag">Arsenal</div>
                <h2 class="section-title" data-i18n="proj_title">Custom Platforms & Tools</h2>
            </div>
            <div class="projects-grid" id="projectsGrid"></div>
        </section>

        <section id="skills" class="section">
            <div class="section-header">
                <div class="section-tag" data-i18n="skill_tag">Skills</div>
                <h2 class="section-title" data-i18n="skill_title">Technical Capabilities</h2>
            </div>
            <div class="skills-container" id="skillsContainer"></div>
        </section>

        <section id="contact" class="section">
            <div class="contact-box" id="contactBox"></div>
        </section>
    </main>

    <footer id="footer"></footer>

    <script src="./js/i18n.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/projects.js"></script>
    <script src="./js/skills.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
